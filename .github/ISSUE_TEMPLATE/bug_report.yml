name: 🐛 Bug report
description: Something isn't working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug! Please fill in the details below.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, plus what you expected to happen instead.
      placeholder: When I run `forge fix ...`, it ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Exact commands / events so we can reproduce it.
      placeholder: |
        1. Run `node dist/cli.js ...`
        2. Open a PR with ...
        3. See error
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Where did it happen?
      options:
        - CLI (local)
        - GitHub Action
        - Hosted GitHub App
        - Not sure
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: LLM provider
      options:
        - Anthropic
        - OpenAI
        - Vertex Gemini
        - AWS Bedrock
        - fake (no key)
        - N/A
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Paste relevant logs. Secrets are auto-redacted, but double-check before pasting.
      render: shell
  - type: input
    id: env
    attributes:
      label: Environment
      description: Node version, OS, and Forge version/commit.
      placeholder: "Node 22.3, macOS 15, forge v1.0.1"
    validations:
      required: true
