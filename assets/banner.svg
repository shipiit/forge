<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ShipIT Forge — autonomous GitHub coding agent">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#a78bfa" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#ec4899" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.4" cy="1.4" r="1.4" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="round"><rect width="1280" height="320" rx="28"/></clipPath>
  </defs>

  <g clip-path="url(#round)">
    <rect width="1280" height="320" fill="#070709"/>
    <rect width="1280" height="320" fill="url(#dots)"/>
    <ellipse cx="1140" cy="20" rx="520" ry="320" fill="url(#glowA)"/>
    <ellipse cx="60" cy="320" rx="460" ry="300" fill="url(#glowB)"/>
    <rect x="0.5" y="0.5" width="1279" height="319" rx="28" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>

    <!-- anvil + spark mark -->
    <g transform="translate(80,118)">
      <g filter="url(#soft)">
        <rect x="0" y="62" width="116" height="20" rx="6" fill="url(#accent)"/>
        <path d="M10 30 H108 a17 17 0 0 1 -17 23 H40 l-8 6 H15 a8 8 0 0 1 -8 -8 Z" fill="#f5f6fa"/>
      </g>
      <path d="M120 -14 l5.5 17 17 5.5 -17 5.5 -5.5 17 -5.5 -17 -17 -5.5 17 -5.5 Z" fill="url(#accent)"/>
      <circle cx="120" cy="8.5" r="5.5" fill="#fce7f3"/>
    </g>

    <!-- wordmark -->
    <text x="248" y="150" font-family="Helvetica, Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="-1.5" fill="#f5f6fa">SHIPIT <tspan fill="#7e8294">FORGE</tspan></text>
    <rect x="250" y="170" width="118" height="3" rx="1.5" fill="url(#accent)"/>

    <!-- tagline -->
    <text x="250" y="206" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="500" fill="#9b9fad">Fixes issues · opens PRs · reviews code &amp; security.</text>

    <!-- capability chips -->
    <g font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="600" fill="#c8ccd8">
      <g transform="translate(250,238)"><rect width="150" height="36" rx="18" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.12"/><text x="75" y="24" text-anchor="middle">Vertex Gemini</text></g>
      <g transform="translate(410,238)"><rect width="118" height="36" rx="18" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.12"/><text x="59" y="24" text-anchor="middle">Bedrock</text></g>
      <g transform="translate(538,238)"><rect width="108" height="36" rx="18" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.12"/><text x="54" y="24" text-anchor="middle">OpenAI</text></g>
      <g transform="translate(656,238)"><rect width="124" height="36" rx="18" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.12"/><text x="62" y="24" text-anchor="middle">Anthropic</text></g>
    </g>

    <!-- mini console card -->
    <g transform="translate(872,70)">
      <rect width="336" height="180" rx="16" fill="#0e0e12" stroke="#ffffff" stroke-opacity="0.1"/>
      <circle cx="22" cy="24" r="5" fill="#ff5f56"/><circle cx="40" cy="24" r="5" fill="#ffbd2e"/><circle cx="58" cy="24" r="5" fill="#27c93f"/>
      <text x="80" y="29" font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#7e8294">shipit-forge</text>
      <line x1="0" y1="48" x2="336" y2="48" stroke="#ffffff" stroke-opacity="0.08"/>
      <g font-family="ui-monospace, Menlo, monospace" font-size="17" fill="#c8ccd8">
        <circle cx="26" cy="80" r="4" fill="url(#accent)"/><text x="44" y="85">issue  -&gt;  fixed PR</text>
        <circle cx="26" cy="116" r="4" fill="url(#accent)"/><text x="44" y="121">pull request  -&gt;  reviewed</text>
        <circle cx="26" cy="152" r="4" fill="url(#accent)"/><text x="44" y="157">CI red  -&gt;  auto-fixed</text>
      </g>
    </g>
  </g>
</svg>
