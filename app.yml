# GitHub App manifest — used to create the ShipIT Forge App in one click.
# Probot serves a registration page at "/" that uses this manifest.
#
# Icon/logo cannot be set via the manifest — upload assets/logo.svg (or a PNG export)
# in the App's Settings → "Display information" → Logo after registration.
name: ShipIT Forge
description: Autonomous coding agent — fixes issues, opens PRs, and reviews PRs (with a security lens).
url: https://github.com/shipiit/forge
# public: false keeps the App installable only on orgs/accounts you administer — best while testing.
# Flip to true later (then it can be installed on ANY org and listed on the GitHub Marketplace).
public: false

default_events:
  - issues
  - issue_comment
  - pull_request
  - pull_request_review
  - pull_request_review_comment
  - check_suite          # auto-fix CI failures on Forge PRs
  - check_run
  - workflow_run

default_permissions:
  # Read/write code so it can push fix branches and edit files.
  contents: write
  # Open PRs and post reviews / inline comments.
  pull_requests: write
  # Read issues and post comments.
  issues: write
  # Read repo metadata (always required).
  metadata: read
  # Read CI/check results when verifying a fix or auto-fixing CI.
  checks: read
  # Read commit statuses (legacy status API used by some CI providers).
  statuses: read
  # Read & re-run GitHub Actions workflow runs (CI auto-fix loop).
  actions: write
  # Read & write workflow files under .github/workflows (e.g. when a fix touches CI).
  workflows: write
  # Read Dependabot alerts (live CVE data from GitHub's Advisory Database).
  vulnerability_alerts: read
